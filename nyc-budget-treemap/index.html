<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC FY2026 Budget Treemap</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f5;
    color: #222;
  }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 28px 40px 20px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header .subtitle {
    font-size: 15px;
    color: #aab;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 40px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    flex-wrap: wrap;
  }

  .breadcrumb {
    font-size: 14px;
    color: #555;
  }

  .breadcrumb span {
    cursor: pointer;
    color: #2563eb;
    text-decoration: underline;
  }

  .breadcrumb span:hover { color: #1d4ed8; }

  .breadcrumb .sep { color: #999; cursor: default; text-decoration: none; }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-left: auto;
    font-size: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s;
  }

  .legend-item:hover { opacity: 0.7; }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }

  #treemap-container {
    padding: 20px 40px 40px;
  }

  #treemap {
    width: 100%;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .node {
    position: absolute;
    overflow: hidden;
    cursor: pointer;
    transition: opacity 0.15s;
    border: 1px solid rgba(255,255,255,0.4);
  }

  .node:hover {
    opacity: 0.88;
  }

  .node-label {
    padding: 6px 8px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    line-height: 1.25;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    pointer-events: none;
  }

  .node-value {
    padding: 0 8px;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    pointer-events: none;
  }

  .tooltip {
    position: fixed;
    padding: 12px 16px;
    background: rgba(20, 20, 35, 0.94);
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 1000;
    max-width: 320px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }

  .tooltip .tt-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .tooltip .tt-category {
    font-size: 11px;
    color: #aab;
    margin-bottom: 6px;
  }

  .tooltip .tt-value {
    font-size: 15px;
    font-weight: 600;
    color: #7dd3fc;
  }

  .tooltip .tt-pct {
    font-size: 12px;
    color: #bbb;
    margin-top: 2px;
  }

  .tooltip .tt-note {
    font-size: 11px;
    color: #999;
    margin-top: 6px;
    font-style: italic;
  }

  .source {
    padding: 10px 40px 30px;
    font-size: 12px;
    color: #888;
  }

  .source a {
    color: #2563eb;
    text-decoration: none;
  }

  .source a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>New York City Budget &mdash; Fiscal Year 2026</h1>
  <div class="subtitle">Adopted Budget: $115.9 Billion &middot; Interactive Treemap</div>
</header>

<div class="controls">
  <div class="breadcrumb" id="breadcrumb">
    <span onclick="zoomTo(root)">All Spending</span>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div id="treemap-container">
  <div id="treemap"></div>
</div>

<div class="source">
  Sources: <a href="https://www.nyc.gov/content/omb/pages/publications/fy2026-adopted-budget" target="_blank">NYC OMB FY2026 Adopted Budget</a>,
  <a href="https://comptroller.nyc.gov/reports/comments-on-new-york-citys-fiscal-year-2026-adopted-budget/" target="_blank">NYC Comptroller</a>,
  <a href="https://cbcny.org/research/nycs-adopted-fiscal-year-2026-budget-numbers" target="_blank">Citizens Budget Commission</a>,
  <a href="https://council.nyc.gov/budget/fy2026/" target="_blank">NYC Council</a>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ─── NYC FY2026 Adopted Budget Data ───
// Total: $115.91 Billion
// Sources: NYC OMB, Comptroller, CBC, FPWA, NYC Council
const budgetData = {
  name: "NYC FY2026 Budget",
  value: 115910,
  children: [
    {
      name: "Education",
      color: "#2563eb",
      children: [
        { name: "Dept of Education", value: 29700, note: "Largest single agency; includes $150M for class-size mandate teachers" },
        { name: "City University of New York", value: 1480, note: "CUNY operating support" }
      ]
    },
    {
      name: "Social Services",
      color: "#7c3aed",
      children: [
        { name: "Social Services (DSS/HRA)", value: 9800, note: "Cash assistance, SNAP, Medicaid admin, emergency food programs" },
        { name: "Dept of Homeless Services", value: 3500, note: "Includes $160M added for non-asylum-seeker shelter costs" },
        { name: "Admin for Children's Services", value: 2900, note: "Child welfare, foster care, child care vouchers (+$229M)" },
        { name: "Youth & Community Development", value: 1200, note: "DYCD; $191M in Council initiatives flow through this agency" },
        { name: "Dept for the Aging", value: 660, note: "DFTA; senior centers, meals, services" },
        { name: "Other Social Services", value: 700, note: "Miscellaneous social service programs" }
      ]
    },
    {
      name: "Public Safety",
      color: "#dc2626",
      children: [
        { name: "Police Dept (NYPD)", value: 6150, note: "92% allocated for personnel; +$309M over FY2025" },
        { name: "Fire Dept (FDNY)", value: 2600, note: "17,177 funded positions; +1.8% over November plan" },
        { name: "Dept of Correction", value: 2870, note: "+9% over FY2025; 87% is personnel costs" }
      ]
    },
    {
      name: "Health",
      color: "#059669",
      children: [
        { name: "Health & Mental Hygiene", value: 2300, note: "DOHMH; $77M in Council initiative funds" },
        { name: "Health + Hospitals (H+H)", value: 1700, note: "Public hospital system; down $1.45B from FY2025 (asylum seeker reduction)" }
      ]
    },
    {
      name: "Infrastructure & Environment",
      color: "#d97706",
      children: [
        { name: "Dept of Sanitation", value: 1970, note: "$1.2B personal services, $758M OTPS; 9,618 positions" },
        { name: "Environmental Protection", value: 1500, note: "Water, sewer, and wastewater systems" },
        { name: "Dept of Transportation", value: 1350, note: "Streets, bridges, traffic management" },
        { name: "Parks & Recreation", value: 1000, note: "+$11.7M for Urban Park Rangers and forestry; +70 maintenance workers" }
      ]
    },
    {
      name: "Housing & Development",
      color: "#0891b2",
      children: [
        { name: "Housing Preservation & Dev", value: 1600, note: "55% federally funded, 40% city-funded" },
        { name: "Dept of Buildings", value: 350, note: "Building inspection and code enforcement" },
        { name: "Economic Development Corp", value: 260, note: "Business development and job creation" }
      ]
    },
    {
      name: "General Government",
      color: "#64748b",
      children: [
        { name: "Dept of Citywide Admin Services", value: 1500, note: "DCAS; citywide operations, facilities, fleet" },
        { name: "Dept of Finance", value: 900, note: "Tax collection and revenue administration" },
        { name: "Dept of Information Technology", value: 750, note: "OTI (formerly DoITT); citywide IT infrastructure" },
        { name: "Law Department", value: 300, note: "Corporation counsel; legal representation" },
        { name: "Dept of Cultural Affairs", value: 250, note: "DCLA; $54M in Council initiative funds" },
        { name: "City Council", value: 120, note: "Legislative branch operations" },
        { name: "Comptroller", value: 110, note: "Fiscal oversight and audit" },
        { name: "Mayor's Office", value: 170, note: "Executive operations and policy" },
        { name: "District Attorneys & Courts", value: 950, note: "All five borough DAs and related judicial support" },
        { name: "Other City Agencies", value: 4057, note: "Includes Probation, Investigation, Elections, Records, Veterans, and others" }
      ]
    },
    {
      name: "Fringe Benefits & Pensions",
      color: "#be185d",
      children: [
        { name: "Pension Contributions", value: 10400, note: "Contributions to five actuarial pension systems" },
        { name: "Health Insurance", value: 8770, note: "Employee and retiree health insurance" },
        { name: "Other Fringe Benefits", value: 5600, note: "Social security, workers' comp, unemployment insurance" }
      ]
    },
    {
      name: "Debt Service",
      color: "#92400e",
      children: [
        { name: "Debt Service", value: 4870, note: "Interest and principal on bonds for capital program" }
      ]
    },
    {
      name: "Other Obligations",
      color: "#475569",
      children: [
        { name: "Asylum Seeker Costs", value: 1300, note: "Down from $3.09B in FY2025; expected to decline further" },
        { name: "General Reserve", value: 1200, note: "Budgetary cushion for unforeseen needs" },
        { name: "Judgments & Claims", value: 823, note: "Settlements and court judgments against the city" },
        { name: "Capital Stabilization Reserve", value: 250, note: "Reserve for capital plan fluctuations" }
      ]
    }
  ]
};

// ─── Config ───
const TOTAL = 115910; // millions
const fmt = d3.format(",.0f");
const fmtB = v => {
  if (v >= 1000) return `$${(v / 1000).toFixed(1)}B`;
  return `$${fmt(v)}M`;
};
const pct = v => `${(v / TOTAL * 100).toFixed(1)}%`;

// ─── Color map ───
const categoryColors = {};
budgetData.children.forEach(c => { categoryColors[c.name] = c.color; });

function getColor(d) {
  // Walk up to find category
  let node = d;
  while (node.depth > 1) node = node.parent;
  return categoryColors[node.data.name] || "#888";
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, Math.round(r * (1 - amount)));
  g = Math.max(0, Math.round(g * (1 - amount)));
  b = Math.max(0, Math.round(b * (1 - amount)));
  return `rgb(${r},${g},${b})`;
}

// ─── Layout ───
const container = document.getElementById('treemap');
let width, height;

function computeSize() {
  const w = container.parentElement.clientWidth;
  width = w;
  height = Math.max(500, Math.min(720, window.innerHeight - 220));
  container.style.width = width + 'px';
  container.style.height = height + 'px';
  container.style.position = 'relative';
}

computeSize();

// Build hierarchy
const hierarchy = d3.hierarchy(budgetData)
  .sum(d => d.value && !d.children ? d.value : 0)
  .sort((a, b) => b.value - a.value);

let root = hierarchy;
let currentRoot = root;

// ─── Legend ───
function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  budgetData.children.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const total = hierarchy.children.find(c => c.data.name === cat.name);
    const val = total ? total.value : 0;
    item.innerHTML = `<div class="legend-swatch" style="background:${cat.color}"></div>${cat.name} (${pct(val)})`;
    item.onclick = () => {
      const node = hierarchy.children.find(c => c.data.name === cat.name);
      if (node) zoomTo(node);
    };
    legend.appendChild(item);
  });
}
buildLegend();

// ─── Tooltip ───
const tooltip = document.getElementById('tooltip');

function showTooltip(e, d) {
  let catName = '';
  let node = d;
  while (node.depth > 1) node = node.parent;
  catName = node.data.name;

  const isCategory = d.children && d.depth === 1;

  let html = `<div class="tt-name">${d.data.name}</div>`;
  if (d.depth > 1) html += `<div class="tt-category">${catName}</div>`;
  html += `<div class="tt-value">${fmtB(d.value)}</div>`;
  html += `<div class="tt-pct">${pct(d.value)} of total budget</div>`;
  if (d.data.note) html += `<div class="tt-note">${d.data.note}</div>`;
  if (isCategory) {
    html += `<div class="tt-note">Click to zoom into ${d.data.name}</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = tooltip;
  const tw = tt.offsetWidth;
  const th = tt.offsetHeight;
  let x = e.clientX + 14;
  let y = e.clientY + 14;
  if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 10;
  if (y + th > window.innerHeight - 10) y = e.clientY - th - 10;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.opacity = 0;
}

// ─── Render ───
function render(zoomNode) {
  currentRoot = zoomNode;
  container.innerHTML = '';

  const isRoot = zoomNode === root;

  // Layout the treemap
  const tm = d3.treemap()
    .size([width, height])
    .tile(d3.treemapSquarify.ratio(1.2))
    .paddingInner(isRoot ? 3 : 2)
    .paddingOuter(isRoot ? 4 : 4)
    .paddingTop(isRoot ? 26 : 4)
    .round(true);

  tm(zoomNode);

  if (isRoot) {
    // ── Root view: show categories with headers + leaf items inside ──
    zoomNode.children.forEach(category => {
      const cx = category.x0;
      const cy = category.y0;
      const cw = category.x1 - category.x0;
      const ch = category.y1 - category.y0;
      if (cw < 2 || ch < 2) return;

      const catColor = categoryColors[category.data.name] || '#888';

      // Category container
      const catDiv = document.createElement('div');
      catDiv.className = 'node';
      catDiv.style.left = cx + 'px';
      catDiv.style.top = cy + 'px';
      catDiv.style.width = cw + 'px';
      catDiv.style.height = ch + 'px';
      catDiv.style.background = darken(catColor, 0.35);
      catDiv.style.border = 'none';
      catDiv.style.borderRadius = '4px';
      catDiv.style.cursor = 'pointer';

      // Category header
      if (cw > 40) {
        const header = document.createElement('div');
        header.style.cssText = `
          position: absolute; top: 0; left: 0; right: 0; height: 24px;
          padding: 4px 8px; font-size: 11px; font-weight: 700;
          color: rgba(255,255,255,0.95); letter-spacing: 0.3px;
          text-transform: uppercase; pointer-events: none;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
          text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        `;
        header.textContent = cw > 100 ? `${category.data.name} — ${fmtB(category.value)}` : category.data.name;
        catDiv.appendChild(header);
      }

      // Category click to zoom
      catDiv.addEventListener('click', (e) => {
        if (e.target === catDiv || e.target.style.pointerEvents === 'none') {
          zoomTo(category);
        }
      });
      catDiv.addEventListener('mousemove', e => {
        if (e.target === catDiv || e.target.style.pointerEvents === 'none') {
          showTooltip(e, category);
        }
      });
      catDiv.addEventListener('mouseleave', hideTooltip);

      container.appendChild(catDiv);

      // Leaf items within category
      const leaves = category.leaves();
      leaves.forEach(d => {
        const lx = d.x0;
        const ly = d.y0;
        const lw = d.x1 - d.x0;
        const lh = d.y1 - d.y0;
        if (lw < 2 || lh < 2) return;

        const div = document.createElement('div');
        div.className = 'node';
        div.style.left = lx + 'px';
        div.style.top = ly + 'px';
        div.style.width = lw + 'px';
        div.style.height = lh + 'px';
        div.style.background = catColor;
        div.style.borderRadius = '2px';

        addLabel(div, d, lw, lh);
        addEvents(div, d, category);

        container.appendChild(div);
      });
    });
  } else {
    // ── Zoomed view: show children of current node ──
    const leaves = zoomNode.leaves();
    const catColor = getColor(zoomNode);

    leaves.forEach((d, i) => {
      const lw = d.x1 - d.x0;
      const lh = d.y1 - d.y0;
      if (lw < 2 || lh < 2) return;

      // Slight shade variation for visual distinction
      const shade = i % 2 === 0 ? catColor : darken(catColor, 0.08);

      const div = document.createElement('div');
      div.className = 'node';
      div.style.left = d.x0 + 'px';
      div.style.top = d.y0 + 'px';
      div.style.width = lw + 'px';
      div.style.height = lh + 'px';
      div.style.background = shade;
      div.style.borderRadius = '3px';

      addLabel(div, d, lw, lh);
      addEvents(div, d, null);

      container.appendChild(div);
    });
  }

  updateBreadcrumb(zoomNode);
}

function addLabel(div, d, w, h) {
  if (w > 45 && h > 26) {
    const label = document.createElement('div');
    label.className = 'node-label';
    label.textContent = d.data.name;
    if (w < 90 || h < 45) label.style.fontSize = '11px';
    if (w < 65) label.style.fontSize = '10px';
    div.appendChild(label);

    if (h > 44 && w > 55) {
      const val = document.createElement('div');
      val.className = 'node-value';
      val.textContent = `${fmtB(d.value)} (${pct(d.value)})`;
      if (w < 90) val.style.fontSize = '10px';
      div.appendChild(val);
    }
  }
}

function addEvents(div, d, parentCategory) {
  div.addEventListener('mousemove', e => { e.stopPropagation(); showTooltip(e, d); });
  div.addEventListener('mouseleave', hideTooltip);
  div.addEventListener('click', (e) => {
    e.stopPropagation();
    if (d.children) {
      zoomTo(d);
    } else if (parentCategory) {
      zoomTo(parentCategory);
    }
  });
}

// ─── Breadcrumb ───
function updateBreadcrumb(node) {
  const bc = document.getElementById('breadcrumb');
  const path = [];
  let n = node;
  while (n) {
    path.unshift(n);
    n = n.parent;
  }

  bc.innerHTML = '';
  path.forEach((p, i) => {
    const span = document.createElement('span');
    span.textContent = p.data.name === "NYC FY2026 Budget" ? "All Spending" : p.data.name;
    if (i < path.length - 1) {
      span.onclick = () => zoomTo(p);
    } else {
      span.style.color = '#222';
      span.style.textDecoration = 'none';
      span.style.cursor = 'default';
    }
    bc.appendChild(span);
    if (i < path.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = ' \u2192 ';
      bc.appendChild(sep);
    }
  });
}

// ─── Zoom ───
function zoomTo(node) {
  if (!node.children && node.parent) {
    node = node.parent;
  }
  render(node);
}

// Initial render
render(root);

// ─── Resize ───
window.addEventListener('resize', () => {
  computeSize();
  render(currentRoot);
});
</script>

</body>
</html>
