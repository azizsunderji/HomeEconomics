name: Update ProMap

on:
  schedule:
    # Run daily at 3 AM EST (8 AM UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regeneration even without new data'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy geopandas requests

    - name: Check for updates
      id: check
      run: |
        cd PriceMaps
        # If force flag is set, skip the check
        if [ "${{ inputs.force }}" = "true" ]; then
          echo "Force regeneration requested"
          echo "new_data=true" >> $GITHUB_OUTPUT
        else
          python scripts/check_for_updates.py
          # Capture the output to determine if there's new data
          if grep -q "NEW_DATA=true" <<< "$(python scripts/check_for_updates.py)"; then
            echo "new_data=true" >> $GITHUB_OUTPUT
          else
            echo "new_data=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Download new data
      if: steps.check.outputs.new_data == 'true'
      run: |
        cd PriceMaps
        python scripts/download_data.py

    - name: Generate promap data
      if: steps.check.outputs.new_data == 'true'
      run: |
        cd PriceMaps
        # Produces output/promap_data.js + output/long_term_changes.json (data only;
        # the HTML is a static file served by the portal).
        python scripts/create_sophisticated_map.py

    - name: Save metadata after successful generation
      if: steps.check.outputs.new_data == 'true'
      run: |
        cd PriceMaps
        python scripts/save_update_metadata.py

    - name: Generate housing statistics
      if: steps.check.outputs.new_data == 'true'
      id: stats
      run: |
        cd PriceMaps
        python scripts/generate_housing_stats.py > stats_output.txt
        # Save output for GitHub Issue
        echo "STATS_CONTENT<<EOF" >> $GITHUB_OUTPUT
        cat stats_output.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload data to Vercel Blob
      if: steps.check.outputs.new_data == 'true'
      env:
        BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      run: |
        cd PriceMaps
        # Uploads output/promap_data.js + output/long_term_changes.json to the
        # promap-data Blob store. The portal serves a static HTML that fetches
        # these at runtime, so this is the entire deploy.
        npm install @vercel/blob
        node scripts/upload_promap_data.mjs

    - name: Commit stats and metadata
      if: steps.check.outputs.new_data == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Get the date from the data
        DATE=$(cd PriceMaps && python -c "import pandas as pd; df=pd.read_csv('data/ZillowZip.csv'); cols=[c for c in df.columns if '-' in c]; print(cols[-1] if cols else 'unknown')")

        git add -f PriceMaps/output/housing_stats_*.md
        git add -f PriceMaps/output/previous_rankings.json
        git add -f PriceMaps/data/last_update.json
        git commit -m "promap: refresh data on Blob + housing stats ($DATE)" || echo "No changes to commit"
        git push

    - name: Create GitHub Issue with housing stats
      if: steps.check.outputs.new_data == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd PriceMaps

        # Get the date from the data
        DATE=$(python -c "import pandas as pd; df=pd.read_csv('data/ZillowZip.csv'); cols=[c for c in df.columns if '-' in c]; print(cols[-1] if cols else 'unknown')")
        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S %Z')

        # Read the stats content
        STATS=$(cat stats_output.txt | grep -A 10000 "HOUSING MARKET STATISTICS")

        # Create issue body
        {
          echo "## Housing Market Statistics - Ready for Email"
          echo ""
          echo "**Data Date:** $DATE"
          echo "**Generated:** $TIMESTAMP"
          echo ""
          echo "---"
          echo ""
          echo "$STATS"
          echo ""
          echo "---"
          echo ""
          echo "**Next Steps:**"
          echo "1. Copy the statistics above"
          echo "2. Paste into your email update"
          echo "3. The data is also saved in the repository at PriceMaps/output/housing_stats_${DATE//-/_}.md"
          echo ""
          echo "**ProMap (live):**"
          echo "- https://tools.home-economics.us/promap"
          echo ""
          echo "Auto-generated by workflow"
        } > issue_body.md

        # Create the issue
        gh issue create \
          --title "📊 Housing Stats Ready - $DATE" \
          --body-file issue_body.md \
          --label "automated,housing-stats,email-ready" \
          --assignee azizsunderji

    - name: Send notification
      if: steps.check.outputs.new_data == 'true'
      run: |
        echo "✅ promap data refreshed on Vercel Blob — live map updates automatically."
        echo "Housing statistics issue created — check your GitHub issues!"
