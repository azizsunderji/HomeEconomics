name: Pulse Daily Synthesis & Email

# Synthesis runs at 7:00am ET (with backups at +20 and +40 min). Email delivery
# is scheduled to land at exactly 8:30am ET via Resend's `scheduled_at`
# parameter — see pulse/scripts/delivery/email_briefing.py — so even if synth
# runs late, the email still arrives at the target time as long as we finish
# before 8:30am ET. The 90-minute buffer is the tradeoff for catching the
# morning news/Substack cycle (most major housing publications drop between
# 6:00 and 7:00am ET). If synth slips past 8:30am ET, email_briefing.py sends
# immediately (it won't push to tomorrow). An external Cloudflare Worker
# cron-triggers the workflow at exactly 11:00 UTC to bypass GitHub's
# unreliable scheduler — the cron entries below are belt-and-suspenders.
#
# Reads the pulse.db that the collection workflow synced to Dropbox,
# re-pulls Gmail to catch late newsletters, classifies, enriches paywalled
# articles via Browserbase, fetches journal abstracts, runs Sonnet synthesis,
# captures FT/NYT frontpage screenshots, and sends the email via Resend.
# Pushes the enriched DB back to Dropbox at the end.

on:
  schedule:
    # GitHub cron is best-effort and frequently fires 30–90 min late under
    # load. We rely on an external Cloudflare Worker (free, sub-second
    # precise) to fire workflow_dispatch at exactly 11:00 UTC. The crons
    # below are belt-and-suspenders — the "already-ran-today" guard
    # prevents double-sending if multiple triggers fire close together.
    # Times below are EDT (March–Nov); during EST they run 1 hour earlier
    # in local time (6:00am ET), which still leaves a 2.5-hour buffer.
    - cron: "0 11 * * *"   # 7:00am ET (EDT) — primary
    - cron: "20 11 * * *"  # 7:20am ET — backup #1
    - cron: "40 11 * * *"  # 7:40am ET — backup #2
  workflow_dispatch:

jobs:
  synth:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # GitHub token for the idempotency guard (lookup of prior successful runs)
      GH_TOKEN: ${{ github.token }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
      GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
      GMAIL_TOKENS: ${{ secrets.GMAIL_TOKENS }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
      BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
      BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
      BROWSERBASE_CONTEXT_ID: ${{ secrets.BROWSERBASE_CONTEXT_ID }}
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_KEY: ${{ secrets.SFTP_KEY }}
      DATA_LAKE_PATH: /tmp/data-lake
      DATA_LAKE_CATALOG_PATH: /tmp/reference/data_lake_catalog.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Idempotency guard: if today's run already succeeded OR is currently
      # in-progress (started earlier than this one), set should_run=false. All
      # subsequent steps are gated on this so backup cron triggers no-op
      # cleanly. The in-progress check matters because the primary 11:00 run
      # can still be running when the 11:20 backup starts (synth takes ~25 min).
      # Manual workflow_dispatch always runs (so we can force a re-send).
      - name: Check if today's briefing already sent or running
        id: guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — proceeding."
            exit 0
          fi
          TODAY_UTC=$(date -u +%Y-%m-%d)
          MY_ID=${{ github.run_id }}
          MY_STARTED=$(gh run view "$MY_ID" --repo "$GITHUB_REPOSITORY" --json createdAt --jq .createdAt)
          # Look at all recent runs of this workflow (success, failure, or in_progress).
          # Skip if there's a prior run today that is either:
          #   (a) already succeeded
          #   (b) still in-progress AND was created before us (it'll get there first)
          BLOCKERS=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow="${{ github.workflow }}" \
            --limit 20 \
            --json databaseId,createdAt,status,conclusion \
            --jq "[.[] | select(.databaseId != $MY_ID) | select(.createdAt | startswith(\"$TODAY_UTC\")) | select(.conclusion == \"success\" or (.status == \"in_progress\" and .createdAt < \"$MY_STARTED\"))] | length")
          if [ "$BLOCKERS" -gt 0 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Today's briefing already sent OR an earlier run is in-progress ($BLOCKERS blocker(s)). Skipping."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "No prior success or earlier-in-progress run today — proceeding."
          fi

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r pulse/requirements.txt
          # Playwright Chromium for Browserbase CDP (browser is remote — just need the Python client)
          python -m playwright install-deps chromium || true

      - name: Install rclone
        if: steps.guard.outputs.should_run == 'true'
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [dropbox]
          type = dropbox
          token = ${{ secrets.RCLONE_DROPBOX_TOKEN }}
          EOF

      - name: Pull Pulse DB + stamp files from Dropbox
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p pulse/data
          # Pull both pulse.db and the JSON stamp files (gmail_token_issued.json,
          # topic_weights.json) so health checks have the latest issuance dates
          # from the user's most-recent local re-auth.
          rclone copy "dropbox:Home Economics/Data/Pulse/" pulse/data/ \
            --include "pulse.db" --include "*.json" \
            --verbose --stats-one-line

      - name: Pull data lake for claim verification
        if: steps.guard.outputs.should_run == 'true'
        run: |
          mkdir -p /tmp/data-lake /tmp/reference
          rclone copy "dropbox:Home Economics/Data/Price/" /tmp/data-lake/Price/ \
            --include "*.parquet" --verbose --stats-one-line --transfers 4
          rclone copy "dropbox:Home Economics/Data/Redfin/" /tmp/data-lake/Redfin/ \
            --include "monthly_metro.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Data/State_Migration/" /tmp/data-lake/State_Migration/ \
            --include "*.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Data/PopulationEstimates/" /tmp/data-lake/PopulationEstimates/ \
            --include "*.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Data/ACS_1Y/" /tmp/data-lake/ACS_1Y/ \
            --include "*.parquet" --verbose --stats-one-line --transfers 4
          rclone copy "dropbox:Home Economics/Data/GSS/" /tmp/data-lake/GSS/ \
            --include "*.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Data/Crosswalks/" /tmp/data-lake/Crosswalks/ \
            --include "*.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Data/Politics/" /tmp/data-lake/Politics/ \
            --include "*.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Data/FHFA_NMDB/" /tmp/data-lake/FHFA_NMDB/ \
            --include "*.parquet" --verbose --stats-one-line
          rclone copy "dropbox:Home Economics/Reference/data_lake_catalog.md" /tmp/reference/ \
            --verbose --stats-one-line || true
          echo "=== Data lake size ===" && du -sh /tmp/data-lake/

      - name: Re-collect Gmail (late newsletters)
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse/scripts
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from store import get_db, bulk_upsert, log_collection_start, log_collection_end
          from collectors import gmail
          conn = get_db()
          run_id = log_collection_start(conn, 'gmail')
          try:
              items = gmail.collect()
              new, dupe = bulk_upsert(conn, items)
              log_collection_end(conn, run_id, len(items), new, dupe)
              print(f'Gmail re-collect: {new} new, {dupe} dupes (of {len(items)})')
          except Exception as e:
              log_collection_end(conn, run_id, 0, 0, 0, error=str(e))
              print(f'Gmail re-collect failed: {e}')
          "

      - name: Classify unclassified items
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse/scripts
        run: python run_pipeline.py classify-only

      - name: Enrich articles via Browserbase
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse
        run: python enrich_articles.py --hours 24 --limit 150

      - name: Enrich t.co links inside high-relevance tweets
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse
        run: python enrich_tweet_links.py --hours 24 --limit 60 --min-relevance 50 || echo "Tweet-link enrichment failed — continuing"

      - name: Fetch journal abstracts
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse
        run: python fetch_journal_abstracts.py

      - name: Capture FT/NYT frontpage screenshots
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse
        run: python capture_frontpages.py || echo "Screenshots failed — continuing without"

      - name: Compute scheduled_at for 8:30am ET delivery
        if: steps.guard.outputs.should_run == 'true'
        run: |
          # Compute today's 8:30am ET in UTC. If today's 8:30am ET has already
          # passed (synth ran very late), emit SEND_NOW so email_briefing.py
          # omits scheduled_at and the email goes immediately — explicitly
          # do NOT push to tomorrow's 8:30am, since a late email is much
          # better than a 24-hour-delayed one. zoneinfo handles EDT/EST
          # automatically. Script is written to /tmp to avoid Python
          # indentation issues with YAML/shell heredoc leading-whitespace.
          cat > /tmp/compute_scheduled_at.py << 'PYEOF'
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          now_utc = datetime.now(timezone.utc)
          et = ZoneInfo('America/New_York')
          target = now_utc.astimezone(et).replace(hour=8, minute=30, second=0, microsecond=0)
          target_utc = target.astimezone(timezone.utc)
          if target_utc <= now_utc:
              print("SEND_NOW")
          else:
              print(target_utc.strftime('%Y-%m-%dT%H:%M:%SZ'))
          PYEOF
          # Strip the leading 10 spaces YAML/shell preserved from the heredoc.
          sed -i 's/^          //' /tmp/compute_scheduled_at.py
          SCHED=$(python /tmp/compute_scheduled_at.py)
          if [ "$SCHED" = "SEND_NOW" ]; then
            echo "Past 8:30am ET — sending immediately (no scheduled_at)"
            # Leave PULSE_EMAIL_SCHEDULED_AT unset so email_briefing.py
            # sends the email through Resend without a hold.
          else
            echo "Computed PULSE_EMAIL_SCHEDULED_AT=$SCHED"
            echo "PULSE_EMAIL_SCHEDULED_AT=$SCHED" >> "$GITHUB_ENV"
          fi

      - name: Run synthesis + send email
        if: steps.guard.outputs.should_run == 'true'
        working-directory: pulse/scripts
        run: python run_pipeline.py synthesize

      - name: Push DB back to Dropbox
        # Run even on failure, but only if the guard let us proceed past the check.
        if: always() && steps.guard.outputs.should_run == 'true'
        run: |
          rclone copy pulse/data/ "dropbox:Home Economics/Data/Pulse/" \
            --include "pulse.db" --include "*.json" \
            --verbose --stats-one-line
