name: Pulse Health Dashboard

# Triggers AFTER the main "Pulse Daily Synthesis & Email" workflow finishes
# (any conclusion — success or failure). Emails Aziz a digest of what the
# run did, what it caught, what's worth watching, and what it cost. On
# failure, also fires off an immediate red alert. Delivery uses Resend
# (same account as the daily Pulse briefing — RESEND_API_KEY secret).

on:
  # Disabled 2026-06-14: user only wants the detailed "Pulse Pipeline Health"
  # email (from pulse-synth.yml). The short digest from this workflow is
  # redundant. Manual trigger preserved in case we want to revive it.
  # workflow_run:
  #   workflows: ["Pulse Daily Synthesis & Email"]
  #   types: [completed]
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      # For build_digest.py's gh-run-list call
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Dashboard scripts only need stdlib (sqlite3 is built-in, urllib for
      # Resend HTTP). No pip install required.

      - name: Install rclone
        run: sudo apt-get update && sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [dropbox]
          type = dropbox
          token = ${{ secrets.RCLONE_DROPBOX_TOKEN }}
          EOF

      - name: Pull Pulse DB from Dropbox
        run: |
          mkdir -p pulse/data
          rclone copy "dropbox:Home Economics/Data/Pulse/" pulse/data/ \
            --include "pulse.db" \
            --verbose --stats-one-line

      # ── Dedupe: only one digest per day ──
      # The synth workflow has two backup cron runs (~12:20 and ~12:40 UTC)
      # behind an idempotency gate. When the main 12:06 run succeeds, the
      # backups still execute but exit in <1 min after the "Check if today's
      # briefing already sent" step. Each completion fires a workflow_run
      # event here, so without dedupe Aziz gets 3 dashboard emails per day.
      # Heuristic: real synth runs take ~25 min; gate-skipped backups < 1 min.
      # Skip the digest when the triggering run was under 5 min (only on
      # workflow_run events — manual workflow_dispatch always sends).
      - name: Detect backup gate-skip
        id: dedupe
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          STARTED="${{ github.event.workflow_run.run_started_at }}"
          UPDATED="${{ github.event.workflow_run.updated_at }}"
          S=$(date -d "$STARTED" +%s)
          U=$(date -d "$UPDATED" +%s)
          DUR=$((U - S))
          echo "Triggering synth run duration: ${DUR}s"
          if [ "$DUR" -lt 300 ]; then
            echo "Under 5 min — treating as backup gate-skip. Will skip digest."
            echo "skip_digest=true" >> "$GITHUB_OUTPUT"
          else
            echo "Over 5 min — treating as real synth run. Will send digest."
            echo "skip_digest=false" >> "$GITHUB_OUTPUT"
          fi

      # ── RED ALERT path — only when the upstream workflow failed ──
      # Always runs on failure regardless of duration (a fast-failing synth
      # is exactly when an alert matters most).
      - name: Send red alert (failure path)
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        working-directory: pulse/scripts/dashboard
        run: |
          MSG=$(python build_alert.py \
            --kind gha_failure \
            --context "The daily run finished with status 'failure' — check the run logs.")
          echo "----- ALERT -----"
          echo "$MSG"
          echo "----- /ALERT -----"
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$MSG" | python send_email.py
          else
            echo "RESEND_API_KEY not set — skipping send"
          fi

      # ── DAILY DIGEST path — runs once per day (skipped for backup gate-skips) ──
      - name: Build and send daily digest
        if: ${{ steps.dedupe.outputs.skip_digest != 'true' }}
        working-directory: pulse/scripts/dashboard
        run: |
          MSG=$(python build_digest.py --db ../../data/pulse.db)
          echo "----- DIGEST -----"
          echo "$MSG"
          echo "----- /DIGEST -----"
          if [ -n "$RESEND_API_KEY" ]; then
            echo "$MSG" | python send_email.py
          else
            echo "RESEND_API_KEY not set — printing only (no email send)"
          fi
