name: Update ProMap

on:
  schedule:
    # Run daily at 3 AM EST (8 AM UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PriceMaps

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy geopandas requests

    - name: Check for updates
      id: check
      run: |
        # For manual triggers, always run
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "new_data=true" >> $GITHUB_OUTPUT
        else
          python scripts/check_for_updates.py
          # Capture the output to determine if there's new data
          if grep -q "NEW_DATA=true" <<< "$(python scripts/check_for_updates.py)"; then
            echo "new_data=true" >> $GITHUB_OUTPUT
          else
            echo "new_data=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Download new data
      if: steps.check.outputs.new_data == 'true' && github.event_name != 'workflow_dispatch'
      run: |
        python scripts/download_data.py

    - name: Download reference files
      if: steps.check.outputs.new_data == 'true' && github.event_name != 'workflow_dispatch'
      run: |
        # Download population data
        mkdir -p resources/populations
        curl -L -o resources/populations/PopulationByZIP.csv \
          "https://github.com/home-economics/reference-data/raw/main/PopulationByZIP.csv" || true

        # Download shapefile components
        mkdir -p resources/shapefiles
        base_url="https://github.com/home-economics/reference-data/raw/main/shapefiles"
        for ext in shp shx dbf prj; do
          curl -L -o "resources/shapefiles/cb_2020_us_zcta520_500k.$ext" \
            "$base_url/cb_2020_us_zcta520_500k.$ext" || true
        done

    - name: Generate state boundaries (if needed)
      if: steps.check.outputs.new_data == 'true'
      run: |
        # Generate state boundaries if they don't exist
        if [ ! -f "output/state_boundaries_low.json" ]; then
          echo "Generating state boundaries..."
          python scripts/prepare_state_geometries.py
        else
          echo "State boundaries already exist, skipping generation"
        fi

    - name: Generate ProMap
      if: steps.check.outputs.new_data == 'true'
      run: |
        python scripts/create_sophisticated_map.py

    - name: Set up Node
      if: steps.check.outputs.new_data == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Upload data to Vercel Blob
      if: steps.check.outputs.new_data == 'true'
      env:
        BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      run: |
        # Uploads output/promap_data.js + output/long_term_changes.json to the
        # promap-data Blob store. The portal serves a static HTML that fetches
        # these at runtime, so this is the entire deploy — no portal push needed.
        npm install @vercel/blob
        node scripts/upload_promap_data.mjs

    - name: Record processed date
      if: steps.check.outputs.new_data == 'true'
      run: |
        python scripts/save_update_metadata.py
        DATE=$(python -c "import json;print(json.load(open('data/last_update.json'))['last_date'])")
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f data/last_update.json
        git commit -m "promap: data refreshed on Blob ($DATE)" || echo "No changes to commit"
        git push

    - name: Done
      if: steps.check.outputs.new_data == 'true'
      run: echo "✅ promap data refreshed on Vercel Blob — live map updates automatically."
